name: LaTeX Build

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile examples
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            main.tex
            demo/demo.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error
